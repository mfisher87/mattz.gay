<!DOCTYPE html>

<html lang="en">

<head>
  <title>🌈</title>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="/favicon.svg" />

  <script>
    if (window.location.protocol === "file:") {
      window.location.href = "yerDoingItWrong.html";
    }
  </script>
</head>

<body>
  <canvas id="mainCanvas"></canvas>
  <div id="overlay">
    <span style="text-align: center">
      Yeeting you to
      <br/><a href="https://mattz.cool">https://mattz.cool</a>
      <br/>...
    </span>
  </div>

  <script type="module">
    import { createCanvas } from "./js/canvas.js";
    import { createRunner } from "./js/runner.js";
    import { animationSequence } from "./js/animationSequence.js";
    import { shouldRedirect, redirectTimer } from "./js/redirect.js";

    if (shouldRedirect()) {
      redirectTimer({ delaySeconds: 8, destination: "https://mattz.cool" });
    }

    const canvas = createCanvas("mainCanvas");

    const runner = createRunner({
      context: canvas.context,
      getCanvasDimensions: canvas.getDimensions,
      animationSequence,
    });

    canvas.onResize((dimensions) => runner.handleResize(dimensions));
    runner.start();
  </script>
</body>

</html>
