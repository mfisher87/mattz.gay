<!DOCTYPE html>

<html lang="en">

<head>
  <title>🌈</title>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="/favicon.svg" />

  <script>
    if (window.location.protocol === "file:") {
      window.location.href = "yerDoingItWrong.html";
    }
  </script>
</head>

<body>
  <canvas id="mainCanvas"></canvas>
  <div id="overlay">
    <span style="text-align: center">
      Yeeting you to
      <br/><a href="https://mattz.cool">https://mattz.cool</a>
      <br/>...
    </span>
  </div>

  <script type="module">
    import {shouldRedirect, redirectTimer} from "./js/redirect.js";

    if (shouldRedirect()) {
      redirectTimer({delaySeconds: 8, destination: "https://mattz.cool"});
    }
  </script>

  <script type="module">
    import {PRIDE_COLORS} from "./js/colors.js";
    import {createCanvas} from "./js/canvas.js";

    const canvas = createCanvas("mainCanvas");

    let offset = 0;
    const scrollPixelsPerSecond = 1200;  // per-second increment handles differences between displays

    let stripeHeight, cycleHeight, stripeCount, canvasWidth, canvasHeight;
    const applyLayout = (dimensions) => {
      canvasWidth = dimensions.width;
      canvasHeight = dimensions.height;

      // The stripes are sized so that half of the colors fit on screen at any time
      stripeHeight = (dimensions.height / PRIDE_COLORS.length) * 2;

      // + 1 extra stripe to account for the partial stripe incoming from offscreen
      stripeCount = Math.ceil(dimensions.height / stripeHeight) + 1;

      cycleHeight = stripeHeight * PRIDE_COLORS.length;
    }
    applyLayout(canvas.getDimensions());
    canvas.onResize(applyLayout);

    let lastTimestamp;
    function draw(timestamp) {
      if (lastTimestamp !== undefined) {
        const elapsed = timestamp - lastTimestamp;

        offset += scrollPixelsPerSecond * (elapsed / 1000);
        if (offset >= cycleHeight) {
          offset -= cycleHeight;
        }
      }
      lastTimestamp = timestamp;

      canvas.context.clearRect(0, 0, canvasWidth, canvasHeight);

      // The offscreen starting position of the first stripe
      const startY = -(offset % stripeHeight)
      const firstColorIndex = Math.floor(offset / stripeHeight);

      for (let stripeIndex = 0; stripeIndex < stripeCount; stripeIndex++) {
        const y = startY + stripeIndex * stripeHeight;
        const colorIndex = (firstColorIndex + stripeIndex) % PRIDE_COLORS.length;

        canvas.context.fillStyle = PRIDE_COLORS[colorIndex];
        canvas.context.fillRect(0, y, canvasWidth, stripeHeight + 1);
      }

      requestAnimationFrame(draw);
    }
    draw();
  </script>
</body>

</html>
