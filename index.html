<!DOCTYPE html>

<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🌈</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #000;

      /* For the overlay dood */
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    #overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;

      font-family: 'Courier New', monospace;
      font-size: 3rem;
      font-weight: bold;
      color: white;
      text-shadow: 0 0 8px rgb(0,0,0), 0 2px 4px rgb(0,0,0);

      animation: flash 1.0s steps(1) infinite;
    }
    #overlay a {
      color: white;
    }
    @media (max-width:768px) {
      #overlay {
        font-size: 1.5rem;
      }
    }

    @keyframes flash {
      0%   { opacity: 1; }
      80%  { opacity: 0; }
    }
  </style>
</head>

<body>
  <canvas id="mainCanvas"></canvas>
  <div id="overlay">
    <span style="text-align: center">
      Redirizzy to
      <br/>
      <a href="https://mattz.cool">https://mattz.cool</a>
      <br/>
      ...
    </span>
  </div>

  <script>
    /**************************
     * Redirect after a delay *
     **************************/

    // set `false` for testing during development, don't forget to set it back silly
    const doRedirect = true;
    const redirectDelaySeconds = 5;

    if (doRedirect) {
      setTimeout(() => {
        window.location.href = "https://mattz.cool";
      }, redirectDelaySeconds * 1000);
    }


    /**************************
     * 🌈🌈🌈🌈🌈🌈🌈🌈🌈🌈🌈 *
     **************************/

    const canvas = document.getElementById("mainCanvas");
    const ctx = canvas.getContext("2d");

    let offset = 0;
    const colors = [
      "#e40303", // Red
      "#ff8c00", // Orange
      "#ffed00", // Yellow
      "#008026", // Green
      "#004cff", // Blue
      "#732982"  // Violet
    ];
    const scrollPixelsPerSecond = 1200;  // per-second increment handles differences between displays

    let stripeHeight;
    let cycleHeight;
    let stripeCount;
    let lastTimestamp;

    function resizeCanvas() {
      canvas.width = canvas.offsetWidth * window.devicePixelRatio;
      canvas.height = canvas.offsetHeight * window.devicePixelRatio;

      stripeHeight = (canvas.height / colors.length) * 2;
      // + 1 extra stripe to account for the partial stripe incoming from offscreen
      stripeCount = Math.ceil(canvas.height / stripeHeight) + 1;
      cycleHeight = stripeHeight * colors.length;
    }
    window.addEventListener("resize", resizeCanvas);
    resizeCanvas();

    function draw(timestamp) {
      if (lastTimestamp !== undefined) {
        const elapsed = timestamp - lastTimestamp;

        offset += scrollPixelsPerSecond * (elapsed / 1000);
        if (offset >= cycleHeight) {
          offset -= cycleHeight;
        }
      }
      lastTimestamp = timestamp;

      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // The offscreen starting position of the first stripe
      const startY = -(offset % stripeHeight)
      const firstColorIndex = Math.floor(offset / stripeHeight);

      for (let stripeIndex = 0; stripeIndex < stripeCount; stripeIndex++) {
        const y = startY + stripeIndex * stripeHeight;
        const colorIndex = (firstColorIndex + stripeIndex) % colors.length;

        ctx.fillStyle = colors[colorIndex];
        ctx.fillRect(0, y, canvas.width, stripeHeight + 1);
      }

      requestAnimationFrame(draw);
    }
    draw();
  </script>
</body>

</html>
