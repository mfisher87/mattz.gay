<!DOCTYPE html>

<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🌈</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #000;

      /* For the overlay dood */
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    #overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;

      font-family: 'Courier New', monospace;
      font-size: 3rem;
      font-weight: bold;
      color: white;
      text-shadow: 0 0 8px rgb(0,0,0), 0 2px 4px rgb(0,0,0);

      animation: flash 0.5s steps(1) infinite;
    }
    #overlay a {
      color: white;
    }
    @media (max-width:768px) {
      #overlay {
        font-size: 1.5rem;
      }
    }

    @keyframes flash {
      0%   { opacity: 1; }
      50%  { opacity: 0; }
    }
  </style>
</head>

<body>
  <canvas id="mainCanvas"></canvas>
  <div id="overlay">
    <span style="text-align: center">
      Redirizzy to
      <br/>
      <a href="https://mattz.cool">https://mattz.cool</a>
      <br/>
      ...
    </span>
  </div>

  <script>
    /**************************
     * Redirect after a delay *
     **************************/

    // set `false` for testing during development, don't forget to set it back silly
    const doRedirect = true;
    const redirectDelaySeconds = 5;

    if (doRedirect) {
      setTimeout(() => {
        window.location.href = "https://mattz.cool";
      }, redirectDelaySeconds * 1000);
    }


    /**************************
     * 🌈🌈🌈🌈🌈🌈🌈🌈🌈🌈🌈 *
     **************************/

    const canvas = document.getElementById("mainCanvas");
    const ctx = canvas.getContext("2d");

    function resizeCanvas() {
      canvas.width = canvas.offsetWidth * window.devicePixelRatio;
      canvas.height = canvas.offsetHeight * window.devicePixelRatio;
    }
    window.addEventListener("resize", resizeCanvas);
    resizeCanvas();

    let offset = 0;
    const scrollPixelsPerFrame = 16;
    const colors = [
      "#e40303", // Red
      "#ff8c00", // Orange
      "#ffed00", // Yellow
      "#008026", // Green
      "#004cff", // Blue
      "#732982"  // Violet
    ];
    const stripeHeight = canvas.height / colors.length;

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      colors.forEach((color, colorIndex) => {
        const yPos = (colorIndex * stripeHeight) + offset;
        ctx.fillStyle = color;

        // "Main" stripe
        ctx.fillRect(
          0,
          yPos,
          canvas.width,
          stripeHeight + 1,  // 1px overdraw for subpixel gaps
        );

        // For seamless looping, fill in the top of the loop with duplicate
        // stripes one canvas.height above.
        ctx.fillRect(
          0,
          yPos - canvas.height,
          canvas.width,
          stripeHeight + 1,  // 1px overdraw for subpixel gaps
        );
      });

      offset += scrollPixelsPerFrame;
      if (offset >= canvas.height) {
        offset -= canvas.height;
      }

      requestAnimationFrame(draw);
    }

    draw();
  </script>
</body>

</html>
