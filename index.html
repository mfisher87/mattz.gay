<!DOCTYPE html>

<html lang="en">

<head>
  <title>🌈</title>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/style.css">
  <script>
    if (window.location.protocol === "file:") {
      window.location.href = "yerDoingItWrong.html";
    }
  </script>
</head>

<body>
  <canvas id="mainCanvas"></canvas>
  <div id="overlay">
    <span style="text-align: center">
      Yeeting you to
      <br/><a href="https://mattz.cool">https://mattz.cool</a>
      <br/>...
    </span>
  </div>

  <script type="module">
    import {shouldRedirect, redirectTimer} from "./js/redirect.js";

    if (shouldRedirect()) {
      redirectTimer({delaySeconds: 8, destination: "https://mattz.cool"});
    }
  </script>

  <script src="./js/colors.js"></script>
  <script>
    /**************************
     * 🌈🌈🌈🌈🌈🌈🌈🌈🌈🌈🌈 *
     **************************/

    const canvas = document.getElementById("mainCanvas");
    const ctx = canvas.getContext("2d");

    let offset = 0;
    const scrollPixelsPerSecond = 1200;  // per-second increment handles differences between displays

    let stripeHeight;
    let cycleHeight;
    let stripeCount;
    let lastTimestamp;

    function resizeCanvas() {
      canvas.width = canvas.offsetWidth * window.devicePixelRatio;
      canvas.height = canvas.offsetHeight * window.devicePixelRatio;

      stripeHeight = (canvas.height / PRIDE_COLORS.length) * 2;
      // + 1 extra stripe to account for the partial stripe incoming from offscreen
      stripeCount = Math.ceil(canvas.height / stripeHeight) + 1;
      cycleHeight = stripeHeight * PRIDE_COLORS.length;
    }
    window.addEventListener("resize", resizeCanvas);
    resizeCanvas();

    function draw(timestamp) {
      if (lastTimestamp !== undefined) {
        const elapsed = timestamp - lastTimestamp;

        offset += scrollPixelsPerSecond * (elapsed / 1000);
        if (offset >= cycleHeight) {
          offset -= cycleHeight;
        }
      }
      lastTimestamp = timestamp;

      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // The offscreen starting position of the first stripe
      const startY = -(offset % stripeHeight)
      const firstColorIndex = Math.floor(offset / stripeHeight);

      for (let stripeIndex = 0; stripeIndex < stripeCount; stripeIndex++) {
        const y = startY + stripeIndex * stripeHeight;
        const colorIndex = (firstColorIndex + stripeIndex) % PRIDE_COLORS.length;

        ctx.fillStyle = PRIDE_COLORS[colorIndex];
        ctx.fillRect(0, y, canvas.width, stripeHeight + 1);
      }

      requestAnimationFrame(draw);
    }
    draw();
  </script>
</body>

</html>
