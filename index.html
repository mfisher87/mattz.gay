<!DOCTYPE html>

<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🌈</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #000;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
  </style>
</head>

<body>
  <canvas id="mainCanvas"></canvas>

  <script>
    /**************************
     * Redirect after a delay *
     **************************/

    // set `false` for testing during development, don't forget to set it back silly
    const doRedirect = true;  

    const redirectUrl = 'https://mattz.cool';
    const redirectDelaySeconds = 5;

    if (doRedirect) {
      setTimeout(() => {
        window.location.href = redirectUrl;
      }, redirectDelaySeconds * 1000);
    }


    /**************************
     * 🌈🌈🌈🌈🌈🌈🌈🌈🌈🌈🌈 *
     **************************/

    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');

    function resizeCanvas() {
      canvas.width = canvas.offsetWidth * window.devicePixelRatio;
      canvas.height = canvas.offsetHeight * window.devicePixelRatio;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    let offset = 0;
    const scrollPixelsPerFrame = 16;
    const colors = [
      '#e40303', // Red
      '#ff8c00', // Orange
      '#ffed00', // Yellow
      '#008026', // Green
      '#004cff', // Blue
      '#732982'  // Violet
    ];
    const stripeHeight = canvas.height / colors.length;

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      colors.forEach((color, colorIndex) => {
        const yPos = (colorIndex * stripeHeight) + offset;
        ctx.fillStyle = color;

        // "Main" stripe
        ctx.fillRect(
          0,
          yPos,
          canvas.width,
          stripeHeight + 1,  // 1px overdraw for subpixel gaps
        );

        // For seamless looping, fill in the top of the loop with duplicate
        // stripes one canvas.height above.
        ctx.fillRect(
          0,
          yPos - canvas.height,
          canvas.width,
          stripeHeight + 1,  // 1px overdraw for subpixel gaps
        );
      });

      offset += scrollPixelsPerFrame;
      if (offset >= canvas.height) {
        offset -= canvas.height;
      }

      requestAnimationFrame(draw);
    }

    draw();
  </script>
</body>

</html>
